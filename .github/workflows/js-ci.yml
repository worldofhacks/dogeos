name: js-ci
on:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.mjs"
      - ".github/workflows/js-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.mjs"
      - ".github/workflows/js-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm test
