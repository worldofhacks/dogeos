[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.26"
evm_version = "paris"
optimizer = true
optimizer_runs = 1_000_000
bytecode_hash = "none"
fs_permissions = [{ access = "read", path = "./"}]

[invariant]
runs = 256
depth = 100
fail_on_revert = false

[fuzz]
runs = 256

[rpc_endpoints]
dogeos = "https://rpc.testnet.dogeos.com"

[etherscan]
dogeos = { key = "blockscout", url = "https://blockscout.testnet.dogeos.com/api", chain = 6281971 }
